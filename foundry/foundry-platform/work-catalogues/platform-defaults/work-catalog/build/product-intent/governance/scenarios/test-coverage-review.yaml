apiVersion: scenario/v1
name: test-coverage-review
description: >
  Governance gate after QA execution: confirm test coverage and results meet
  the quality bar before the Product Intent is handed to Release.
workspace: governance
scope: workspace-ingress

inputs:
  - name: product_intent_id
    type: string
    required: true
    description: Product Intent being governed
  - name: test_run_id
    type: string
    required: true
    description: QA test run under review

outputs:
  - name: decision
    type: enum
    values: [approved, rejected]
    description: Governance decision
  - name: findings
    type: array
    items: string
    description: Quality concerns that must be addressed if rejected

required-skills:
  - governance-review
  - quality-assurance

tasks:
  - id: evaluate-results
    type: agent
    description: Evaluate pass rate, open defects, and coverage against the bar
  - id: record-decision
    type: agent
    description: Record the governance decision and findings
    depends-on: [evaluate-results]
