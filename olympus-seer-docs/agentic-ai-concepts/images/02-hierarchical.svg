<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
  <!-- Top Manager -->
  <rect x="200" y="20" width="100" height="60" rx="5" fill="#4A90E2" stroke="#2E5C8A" stroke-width="2"/>
  <text x="250" y="50" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">Top Manager</text>
  
  <!-- Sub-Managers -->
  <rect x="80" y="140" width="90" height="50" rx="5" fill="#50C878" stroke="#2E8B57" stroke-width="2"/>
  <text x="125" y="170" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Sub-Manager 1</text>
  
  <rect x="205" y="140" width="90" height="50" rx="5" fill="#50C878" stroke="#2E8B57" stroke-width="2"/>
  <text x="250" y="170" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Sub-Manager 2</text>
  
  <rect x="330" y="140" width="90" height="50" rx="5" fill="#50C878" stroke="#2E8B57" stroke-width="2"/>
  <text x="375" y="170" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Sub-Manager 3</text>
  
  <!-- Workers -->
  <rect x="30" y="260" width="70" height="40" rx="5" fill="#7ED321" stroke="#5A9A15" stroke-width="2"/>
  <text x="65" y="285" text-anchor="middle" fill="white" font-family="Arial" font-size="11">Worker 1</text>
  
  <rect x="110" y="260" width="70" height="40" rx="5" fill="#7ED321" stroke="#5A9A15" stroke-width="2"/>
  <text x="145" y="285" text-anchor="middle" fill="white" font-family="Arial" font-size="11">Worker 2</text>
  
  <rect x="155" y="260" width="70" height="40" rx="5" fill="#7ED321" stroke="#5A9A15" stroke-width="2"/>
  <text x="190" y="285" text-anchor="middle" fill="white" font-family="Arial" font-size="11">Worker 3</text>
  
  <rect x="235" y="260" width="70" height="40" rx="5" fill="#7ED321" stroke="#5A9A15" stroke-width="2"/>
  <text x="270" y="285" text-anchor="middle" fill="white" font-family="Arial" font-size="11">Worker 4</text>
  
  <rect x="315" y="260" width="70" height="40" rx="5" fill="#7ED321" stroke="#5A9A15" stroke-width="2"/>
  <text x="350" y="285" text-anchor="middle" fill="white" font-family="Arial" font-size="11">Worker 5</text>
  
  <rect x="400" y="260" width="70" height="40" rx="5" fill="#7ED321" stroke="#5A9A15" stroke-width="2"/>
  <text x="435" y="285" text-anchor="middle" fill="white" font-family="Arial" font-size="11">Worker 6</text>
  
  <!-- Arrows: Top to Sub-Managers -->
  <line x1="250" y1="80" x2="125" y2="140" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="250" y1="80" x2="250" y2="140" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="250" y1="80" x2="375" y2="140" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Arrows: Sub-Managers to Workers -->
  <line x1="125" y1="190" x2="65" y2="260" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="125" y1="190" x2="145" y2="260" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="250" y1="190" x2="190" y2="260" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="250" y1="190" x2="270" y2="260" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="375" y1="190" x2="350" y2="260" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="375" y1="190" x2="435" y2="260" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
  </defs>
</svg>
