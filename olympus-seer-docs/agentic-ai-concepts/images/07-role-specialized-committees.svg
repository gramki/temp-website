<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
  <!-- Problem/Decision in center -->
  <rect x="200" y="150" width="100" height="80" rx="5" fill="#E74C3C" stroke="#A93226" stroke-width="2"/>
  <text x="250" y="180" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Problem /</text>
  <text x="250" y="200" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Decision</text>
  <text x="250" y="220" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Request</text>
  
  <!-- Specialized agents around -->
  <rect x="50" y="50" width="90" height="50" rx="5" fill="#3498DB" stroke="#21618C" stroke-width="2"/>
  <text x="95" y="75" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Risk Agent</text>
  
  <rect x="360" y="50" width="90" height="50" rx="5" fill="#3498DB" stroke="#21618C" stroke-width="2"/>
  <text x="405" y="75" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Legal Agent</text>
  
  <rect x="50" y="300" width="90" height="50" rx="5" fill="#3498DB" stroke="#21618C" stroke-width="2"/>
  <text x="95" y="325" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Ops Agent</text>
  
  <rect x="360" y="300" width="90" height="50" rx="5" fill="#3498DB" stroke="#21618C" stroke-width="2"/>
  <text x="405" y="325" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Security Agent</text>
  
  <rect x="200" y="20" width="100" height="50" rx="5" fill="#3498DB" stroke="#21618C" stroke-width="2"/>
  <text x="250" y="45" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">UX Agent</text>
  
  <!-- Review arrows to center -->
  <line x1="95" y1="100" x2="220" y2="180" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="405" y1="100" x2="280" y2="180" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="95" y1="300" x2="220" y2="210" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="405" y1="300" x2="280" y2="210" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="250" y1="70" x2="250" y2="170" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Arbiter/Decision -->
  <rect x="200" y="280" width="100" height="50" rx="5" fill="#F39C12" stroke="#B9770E" stroke-width="2"/>
  <text x="250" y="305" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Arbiter</text>
  <text x="250" y="320" text-anchor="middle" fill="white" font-family="Arial" font-size="10">Consensus/Vote</text>
  
  <!-- Decision arrow -->
  <line x1="250" y1="230" x2="250" y2="280" stroke="#E74C3C" stroke-width="2" marker-end="url(#arrowhead-red)"/>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#E74C3C"/>
    </marker>
  </defs>
</svg>
