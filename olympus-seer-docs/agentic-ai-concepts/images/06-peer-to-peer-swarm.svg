<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
  <!-- Peer agents in a mesh -->
  <circle cx="100" cy="100" r="35" fill="#3498DB" stroke="#21618C" stroke-width="2"/>
  <text x="100" y="105" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">P1</text>
  
  <circle cx="250" cy="80" r="35" fill="#3498DB" stroke="#21618C" stroke-width="2"/>
  <text x="250" y="85" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">P2</text>
  
  <circle cx="400" cy="100" r="35" fill="#3498DB" stroke="#21618C" stroke-width="2"/>
  <text x="400" y="105" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">P3</text>
  
  <circle cx="150" cy="200" r="35" fill="#3498DB" stroke="#21618C" stroke-width="2"/>
  <text x="150" y="205" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">P4</text>
  
  <circle cx="300" cy="220" r="35" fill="#3498DB" stroke="#21618C" stroke-width="2"/>
  <text x="300" y="225" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">P5</text>
  
  <circle cx="100" cy="300" r="35" fill="#3498DB" stroke="#21618C" stroke-width="2"/>
  <text x="100" y="305" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">P6</text>
  
  <circle cx="400" cy="300" r="35" fill="#3498DB" stroke="#21618C" stroke-width="2"/>
  <text x="400" y="305" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">P7</text>
  
  <!-- Bidirectional connections (mesh) -->
  <line x1="100" y1="100" x2="250" y2="80" stroke="#7FB3D3" stroke-width="1.5"/>
  <line x1="250" y1="80" x2="400" y2="100" stroke="#7FB3D3" stroke-width="1.5"/>
  <line x1="100" y1="100" x2="150" y2="200" stroke="#7FB3D3" stroke-width="1.5"/>
  <line x1="250" y1="80" x2="150" y2="200" stroke="#7FB3D3" stroke-width="1.5"/>
  <line x1="250" y1="80" x2="300" y2="220" stroke="#7FB3D3" stroke-width="1.5"/>
  <line x1="400" y1="100" x2="300" y2="220" stroke="#7FB3D3" stroke-width="1.5"/>
  <line x1="150" y1="200" x2="300" y2="220" stroke="#7FB3D3" stroke-width="1.5"/>
  <line x1="150" y1="200" x2="100" y2="300" stroke="#7FB3D3" stroke-width="1.5"/>
  <line x1="300" y1="220" x2="400" y2="300" stroke="#7FB3D3" stroke-width="1.5"/>
  <line x1="100" y1="300" x2="300" y2="220" stroke="#7FB3D3" stroke-width="1.5"/>
  
  <!-- No central controller label -->
  <text x="250" y="360" text-anchor="middle" font-family="Arial" font-size="14" fill="#7F8C8D" font-style="italic">No Central Controller - Lateral Communication</text>
</svg>
