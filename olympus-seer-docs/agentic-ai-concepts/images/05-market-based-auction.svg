<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
  <!-- Task Scheduler/Broadcaster -->
  <rect x="200" y="20" width="100" height="60" rx="5" fill="#F39C12" stroke="#B9770E" stroke-width="2"/>
  <text x="250" y="45" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">Task</text>
  <text x="250" y="65" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">Scheduler</text>
  
  <!-- Task broadcast -->
  <ellipse cx="250" cy="120" rx="80" ry="30" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="250" y="125" text-anchor="middle" font-family="Arial" font-size="11">Task Broadcast</text>
  
  <!-- Agents bidding -->
  <rect x="50" y="200" width="90" height="60" rx="5" fill="#3498DB" stroke="#21618C" stroke-width="2"/>
  <text x="95" y="225" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Agent 1</text>
  <text x="95" y="245" text-anchor="middle" fill="white" font-family="Arial" font-size="10">Bid: $10</text>
  
  <rect x="155" y="200" width="90" height="60" rx="5" fill="#E74C3C" stroke="#A93226" stroke-width="2"/>
  <text x="200" y="225" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Agent 2</text>
  <text x="200" y="245" text-anchor="middle" fill="white" font-family="Arial" font-size="10">Bid: $5</text>
  
  <rect x="255" y="200" width="90" height="60" rx="5" fill="#27AE60" stroke="#1E8449" stroke-width="2"/>
  <text x="300" y="225" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Agent 3</text>
  <text x="300" y="245" text-anchor="middle" fill="white" font-family="Arial" font-size="10">Bid: $8</text>
  
  <rect x="360" y="200" width="90" height="60" rx="5" fill="#9B59B6" stroke="#6B3483" stroke-width="2"/>
  <text x="405" y="225" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Agent 4</text>
  <text x="405" y="245" text-anchor="middle" fill="white" font-family="Arial" font-size="10">Bid: $12</text>
  
  <!-- Bids to scheduler -->
  <line x1="95" y1="200" x2="220" y2="120" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="200" y1="200" x2="240" y2="120" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="300" y1="200" x2="260" y2="120" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="405" y1="200" x2="280" y2="120" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Assignment (winner) -->
  <line x1="250" y1="80" x2="200" y2="200" stroke="#E74C3C" stroke-width="3" marker-end="url(#arrowhead-red)"/>
  <text x="220" y="140" text-anchor="middle" font-family="Arial" font-size="11" fill="#E74C3C" font-weight="bold">Assigned</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#E74C3C"/>
    </marker>
  </defs>
</svg>
