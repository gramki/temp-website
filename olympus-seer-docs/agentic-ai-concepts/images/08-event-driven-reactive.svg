<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
  <!-- Event Bus/Stream -->
  <rect x="50" y="180" width="400" height="40" rx="5" fill="#34495E" stroke="#1C2833" stroke-width="2"/>
  <text x="250" y="205" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">Event Bus / Message Stream</text>
  
  <!-- Events -->
  <circle cx="100" cy="200" r="8" fill="#E74C3C"/>
  <text x="100" y="170" text-anchor="middle" font-family="Arial" font-size="10">Event 1</text>
  
  <circle cx="200" cy="200" r="8" fill="#E74C3C"/>
  <text x="200" y="170" text-anchor="middle" font-family="Arial" font-size="10">Event 2</text>
  
  <circle cx="300" cy="200" r="8" fill="#E74C3C"/>
  <text x="300" y="170" text-anchor="middle" font-family="Arial" font-size="10">Event 3</text>
  
  <circle cx="400" cy="200" r="8" fill="#E74C3C"/>
  <text x="400" y="170" text-anchor="middle" font-family="Arial" font-size="10">Event 4</text>
  
  <!-- Reactive Agents -->
  <rect x="50" y="50" width="80" height="50" rx="5" fill="#3498DB" stroke="#21618C" stroke-width="2"/>
  <text x="90" y="75" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Agent 1</text>
  <text x="90" y="90" text-anchor="middle" fill="white" font-family="Arial" font-size="9">Subscribed</text>
  
  <rect x="160" y="50" width="80" height="50" rx="5" fill="#3498DB" stroke="#21618C" stroke-width="2"/>
  <text x="200" y="75" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Agent 2</text>
  <text x="200" y="90" text-anchor="middle" fill="white" font-family="Arial" font-size="9">Subscribed</text>
  
  <rect x="270" y="50" width="80" height="50" rx="5" fill="#3498DB" stroke="#21618C" stroke-width="2"/>
  <text x="310" y="75" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Agent 3</text>
  <text x="310" y="90" text-anchor="middle" fill="white" font-family="Arial" font-size="9">Subscribed</text>
  
  <rect x="380" y="50" width="80" height="50" rx="5" fill="#3498DB" stroke="#21618C" stroke-width="2"/>
  <text x="420" y="75" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Agent 4</text>
  <text x="420" y="90" text-anchor="middle" fill="white" font-family="Arial" font-size="9">Subscribed</text>
  
  <!-- Agents below -->
  <rect x="50" y="280" width="80" height="50" rx="5" fill="#3498DB" stroke="#21618C" stroke-width="2"/>
  <text x="90" y="305" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Agent 5</text>
  <text x="90" y="320" text-anchor="middle" fill="white" font-family="Arial" font-size="9">Subscribed</text>
  
  <rect x="160" y="280" width="80" height="50" rx="5" fill="#3498DB" stroke="#21618C" stroke-width="2"/>
  <text x="200" y="305" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Agent 6</text>
  <text x="200" y="320" text-anchor="middle" fill="white" font-family="Arial" font-size="9">Subscribed</text>
  
  <rect x="270" y="280" width="80" height="50" rx="5" fill="#3498DB" stroke="#21618C" stroke-width="2"/>
  <text x="310" y="305" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Agent 7</text>
  <text x="310" y="320" text-anchor="middle" fill="white" font-family="Arial" font-size="9">Subscribed</text>
  
  <rect x="380" y="280" width="80" height="50" rx="5" fill="#3498DB" stroke="#21618C" stroke-width="2"/>
  <text x="420" y="305" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Agent 8</text>
  <text x="420" y="320" text-anchor="middle" fill="white" font-family="Arial" font-size="9">Subscribed</text>
  
  <!-- Subscription arrows -->
  <line x1="90" y1="100" x2="100" y2="180" stroke="#7FB3D3" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/>
  <line x1="200" y1="100" x2="200" y2="180" stroke="#7FB3D3" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/>
  <line x1="310" y1="100" x2="300" y2="180" stroke="#7FB3D3" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/>
  <line x1="420" y1="100" x2="400" y2="180" stroke="#7FB3D3" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/>
  
  <line x1="90" y1="280" x2="100" y2="220" stroke="#7FB3D3" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/>
  <line x1="200" y1="280" x2="200" y2="220" stroke="#7FB3D3" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/>
  <line x1="310" y1="280" x2="300" y2="220" stroke="#7FB3D3" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/>
  <line x1="420" y1="280" x2="400" y2="220" stroke="#7FB3D3" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#7FB3D3"/>
    </marker>
  </defs>
</svg>
