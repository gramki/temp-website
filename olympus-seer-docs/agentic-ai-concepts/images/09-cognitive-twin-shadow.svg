<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
  <!-- Primary Agent -->
  <rect x="50" y="150" width="120" height="70" rx="5" fill="#3498DB" stroke="#21618C" stroke-width="2"/>
  <text x="110" y="180" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">Primary Agent</text>
  <text x="110" y="200" text-anchor="middle" fill="white" font-family="Arial" font-size="12">Proposes Action</text>
  
  <!-- Shadow/Twin Agent -->
  <rect x="330" y="150" width="120" height="70" rx="5" fill="#95A5A6" stroke="#7F8C8D" stroke-width="2"/>
  <text x="390" y="180" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">Shadow Agent</text>
  <text x="390" y="200" text-anchor="middle" fill="white" font-family="Arial" font-size="12">Simulates/Checks</text>
  
  <!-- Action proposal -->
  <rect x="200" y="80" width="100" height="50" rx="5" fill="#E67E22" stroke="#A0522D" stroke-width="2"/>
  <text x="250" y="105" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Action</text>
  <text x="250" y="120" text-anchor="middle" fill="white" font-family="Arial" font-size="11">Proposal</text>
  
  <!-- Simulation result -->
  <rect x="200" y="240" width="100" height="50" rx="5" fill="#27AE60" stroke="#1E8449" stroke-width="2"/>
  <text x="250" y="265" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Simulation</text>
  <text x="250" y="280" text-anchor="middle" fill="white" font-family="Arial" font-size="11">Result</text>
  
  <!-- Decision gate -->
  <rect x="200" y="320" width="100" height="50" rx="5" fill="#E74C3C" stroke="#A93226" stroke-width="2"/>
  <text x="250" y="345" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Decision</text>
  <text x="250" y="360" text-anchor="middle" fill="white" font-family="Arial" font-size="11">Gate</text>
  
  <!-- Flow arrows -->
  <!-- Primary to Action -->
  <line x1="170" y1="185" x2="200" y2="105" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Action to Shadow -->
  <line x1="300" y1="105" x2="330" y2="185" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Shadow to Simulation -->
  <line x1="330" y1="220" x2="300" y2="240" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Simulation to Decision -->
  <line x1="250" y1="290" x2="250" y2="320" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Decision back to Primary (approved) or stop (rejected) -->
  <path d="M 200 345 Q 100 345, 110 220" stroke="#27AE60" stroke-width="2" fill="none" marker-end="url(#arrowhead-green)" stroke-dasharray="5,5"/>
  <text x="120" y="280" text-anchor="middle" font-family="Arial" font-size="10" fill="#27AE60">Approved</text>
  
  <!-- Counterfactual label -->
  <text x="250" y="50" text-anchor="middle" font-family="Arial" font-size="12" fill="#7F8C8D" font-style="italic">Counterfactual Evaluation</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#27AE60"/>
    </marker>
  </defs>
</svg>
