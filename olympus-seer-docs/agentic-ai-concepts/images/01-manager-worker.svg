<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Manager/Orchestrator -->
  <rect x="150" y="20" width="100" height="60" rx="5" fill="#4A90E2" stroke="#2E5C8A" stroke-width="2"/>
  <text x="200" y="50" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">Manager</text>
  <text x="200" y="70" text-anchor="middle" fill="white" font-family="Arial" font-size="12">Orchestrator</text>
  
  <!-- Workers -->
  <rect x="50" y="150" width="80" height="50" rx="5" fill="#7ED321" stroke="#5A9A15" stroke-width="2"/>
  <text x="90" y="180" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Worker 1</text>
  
  <rect x="160" y="150" width="80" height="50" rx="5" fill="#7ED321" stroke="#5A9A15" stroke-width="2"/>
  <text x="200" y="180" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Worker 2</text>
  
  <rect x="270" y="150" width="80" height="50" rx="5" fill="#7ED321" stroke="#5A9A15" stroke-width="2"/>
  <text x="310" y="180" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Worker 3</text>
  
  <!-- Arrows: Manager to Workers -->
  <line x1="200" y1="80" x2="90" y2="150" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="200" y1="80" x2="200" y2="150" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="200" y1="80" x2="310" y2="150" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
  </defs>
</svg>
