<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Planner -->
  <rect x="50" y="50" width="100" height="60" rx="5" fill="#9B59B6" stroke="#6B3483" stroke-width="2"/>
  <text x="100" y="80" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">Planner</text>
  
  <!-- Executor -->
  <rect x="200" y="50" width="100" height="60" rx="5" fill="#E67E22" stroke="#A0522D" stroke-width="2"/>
  <text x="250" y="80" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">Executor</text>
  
  <!-- Critic -->
  <rect x="350" y="50" width="100" height="60" rx="5" fill="#E74C3C" stroke="#A93226" stroke-width="2"/>
  <text x="400" y="80" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">Critic</text>
  
  <!-- Loop arrows -->
  <!-- Planner to Executor -->
  <path d="M 150 80 Q 200 40, 200 80" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="175" y="50" text-anchor="middle" font-family="Arial" font-size="10">Plan</text>
  
  <!-- Executor to Critic -->
  <path d="M 300 80 Q 350 40, 350 80" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="325" y="50" text-anchor="middle" font-family="Arial" font-size="10">Result</text>
  
  <!-- Critic back to Planner (feedback loop) -->
  <path d="M 350 110 Q 250 180, 100 110" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <text x="225" y="160" text-anchor="middle" font-family="Arial" font-size="10">Feedback</text>
  
  <!-- Stop condition -->
  <rect x="150" y="200" width="200" height="40" rx="5" fill="#95A5A6" stroke="#7F8C8D" stroke-width="2"/>
  <text x="250" y="225" text-anchor="middle" fill="white" font-family="Arial" font-size="12">Stop when criteria met</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
  </defs>
</svg>
